services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      MONGO_CONNECTION: mongodb://mongo:27017/short-link
      API_PORT: 8000
      PORT: 8000
      BASE: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-me}
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ""
      PORT: 3000
    depends_on:
      - api

volumes:
  mongo_data:
